kind = "web"
previewPath = "/"
title = "SCAVA — Brew & Play"
version = "1.0.0"
id = "artifacts/scava"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18705

[services.development]
run = "pnpm --filter @workspace/scava run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/scava", "run", "build" ]
publicDir = "artifacts/scava/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18705"
BASE_PATH = "/"
